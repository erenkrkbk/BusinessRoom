<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MoneyPay — Oda Ekranı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --mp-purple:#4A50A2;
    --mp-purple-dark:#20234E;
    --mp-purple-deeper:#171A3D;
    --mp-orange:#FF5F00;
    --mp-white:#FFFFFF;
    --mp-ink:#1B1E3D;
    --mp-paper:#F5F4FA;
    --mp-line:rgba(27,30,61,0.10);
    --cut:28px; /* diagonal corner-cut size, echoes the 'pay' badge shape */
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%; overflow:hidden;
    font-family:'Inter',sans-serif;
    background:var(--mp-paper);
    color:var(--mp-ink);
  }
  body{
    display:flex; flex-direction:column;
    height:100vh; width:100vw;
    transition:background 480ms ease;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 32px 18px 32px;
    flex:0 0 auto;
  }
  .brand{ display:flex; align-items:center; gap:16px; }
  .brand img{ height:34px; width:auto; display:block; }
  .room-info{ display:flex; flex-direction:column; gap:2px; }
  .room-name{
    font-family:'Sora',sans-serif; font-weight:700; font-size:22px;
    color:var(--mp-ink); letter-spacing:-0.01em;
  }
  .room-meta{
    font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
    color:rgba(27,30,61,0.5); letter-spacing:0.01em;
  }
  body.state-occupied .room-meta{ color:rgba(255,255,255,0.55); }
  /* Signature element: diagonal-cut tab, echoing the "pay" chip shape in the logo */
  .clock-tab{
    background:var(--mp-purple);
    color:var(--mp-white);
    padding:10px 26px 10px 22px;
    font-family:'Sora',sans-serif; font-weight:700; font-size:20px;
    letter-spacing:0.02em;
    clip-path:polygon(0 0, 100% 0, calc(100% - var(--cut)) 100%, 0 100%);
    display:flex; align-items:center; gap:10px;
    min-width:150px; justify-content:center;
  }
  .clock-tab .date{
    font-family:'Inter',sans-serif; font-weight:500; font-size:12px;
    opacity:0.75; display:block; text-align:center; margin-top:2px;
  }
  .clock-wrap{ text-align:center; }

  /* ---------- Hero status ---------- */
  .hero{
    flex:1 1 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:10px 40px;
    position:relative;
  }
  .status-dot{
    width:18px; height:18px; border-radius:50%;
    display:inline-block; flex:0 0 auto;
    box-shadow:0 0 0 5px currentColor;
    opacity:0.9;
    margin-bottom:0.09em; /* optical alignment with cap-height, not centerline */
  }
  .status-word{
    font-family:'Inter',sans-serif; font-weight:900;
    font-size:min(12vw, 128px);
    line-height:1.15; letter-spacing:-0.01em;
    display:flex; align-items:center; justify-content:center;
    gap:22px;
    white-space:nowrap;
    padding-bottom:0.06em; /* room for descender-free caps, keeps it from feeling clipped */
  }
  .status-word span:last-child{ padding-top:0.02em; font-feature-settings:"tnum"; }
  .status-sub{
    font-family:'Inter',sans-serif; font-weight:500; font-size:22px;
    margin-top:18px; opacity:0.8; max-width:720px;
  }

  /* Available state */
  body.state-available{ background:var(--mp-paper); }
  body.state-available .status-word{ color:var(--mp-orange); }
  body.state-available .status-sub{ color:var(--mp-ink); }
  body.state-available .status-dot{ color:var(--mp-orange); }
  body.state-available .clock-tab{ background:var(--mp-purple); }

  /* Occupied state — echoes the solid "pay" badge block */
  body.state-occupied{ background:var(--mp-purple-dark); }
  body.state-occupied .room-name{ color:var(--mp-white); }
  body.state-occupied .status-word{ color:var(--mp-white); }
  body.state-occupied .status-sub{ color:rgba(255,255,255,0.75); }
  body.state-occupied .status-dot{ color:var(--mp-orange); }
  body.state-occupied .clock-tab{ background:var(--mp-orange); }
  body.state-occupied .meeting-panels{ background:var(--mp-purple-deeper); border-color:rgba(255,255,255,0.08); }
  body.state-occupied .panel-label{ color:rgba(255,255,255,0.55); }
  body.state-occupied .panel-title{ color:var(--mp-white); }
  body.state-occupied .panel-time{ color:rgba(255,255,255,0.65); }
  body.state-occupied .footer{ background:var(--mp-purple-deeper); border-color:rgba(255,255,255,0.08); }

  /* ---------- Daily timeline strip ---------- */
  .day-timeline{
    flex:0 0 auto;
    margin:0 32px 18px 32px;
  }
  .timeline-track{
    position:relative;
    height:14px;
    border-radius:8px;
    background:rgba(27,30,61,0.08);
    overflow:hidden;
  }
  body.state-occupied .timeline-track{ background:rgba(255,255,255,0.10); }
  .timeline-block{
    position:absolute; top:0; bottom:0;
    background:rgba(255,95,0,0.4);
    border-radius:3px;
  }
  .timeline-block.is-current{ background:var(--mp-orange); }
  body.state-occupied .timeline-block{ background:rgba(255,95,0,0.55); }
  body.state-occupied .timeline-block.is-current{ background:var(--mp-orange); }
  .timeline-now{
    position:absolute; top:-3px; bottom:-3px;
    width:2px; background:var(--mp-ink);
    z-index:2;
  }
  body.state-occupied .timeline-now{ background:var(--mp-white); }
  .timeline-labels{
    display:flex; justify-content:space-between;
    margin-top:6px;
    font-family:'Inter',sans-serif; font-weight:600; font-size:11px;
    color:rgba(27,30,61,0.4);
  }
  body.state-occupied .timeline-labels{ color:rgba(255,255,255,0.4); }

  /* ---------- Meeting panels ---------- */
  .meeting-panels{
    flex:0 0 auto;
    display:grid; grid-template-columns:1fr 1fr;
    gap:1px; background:var(--mp-line);
    margin:0 32px; border-radius:14px; overflow:hidden;
    border:1px solid var(--mp-line);
  }
  .panel{ background:var(--mp-paper); padding:26px 30px; }
  body.state-available .panel{ background:#FFFFFF; }
  body.state-occupied .panel{ background:var(--mp-purple-deeper); }
  .panel-label{
    font-family:'Inter',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:0.1em; text-transform:uppercase; color:rgba(27,30,61,0.5);
    margin-bottom:10px;
  }
  .panel-title{
    font-family:'Sora',sans-serif; font-weight:700; font-size:25px;
    color:var(--mp-ink); line-height:1.25;
  }
  .panel-time{
    font-family:'Inter',sans-serif; font-weight:600; font-size:17px;
    color:rgba(27,30,61,0.6); margin-top:6px;
  }
  .panel-empty{
    font-family:'Inter',sans-serif; font-weight:700; font-size:19px;
    color:rgba(27,30,61,0.55);
  }
  body.state-available .panel-empty{ color:var(--mp-ink); opacity:0.7; }
  body.state-occupied .panel-empty{ color:rgba(255,255,255,0.55); }

  /* ---------- Footer / CTA ---------- */
  .footer{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    padding:22px 32px 28px 32px;
    gap:14px;
  }
  .btn{
    font-family:'Sora',sans-serif; font-weight:700; font-size:17px;
    border:none; cursor:pointer;
    padding:16px 34px 16px 28px;
    clip-path:polygon(0 0, 100% 0, calc(100% - 18px) 100%, 0 100%);
    transition:transform 120ms ease, opacity 120ms ease;
  }
  .btn:active{ transform:scale(0.97); opacity:0.9; }
  .btn-primary{ background:var(--mp-orange); color:var(--mp-white); }
  .btn-ghost{
    background:var(--mp-purple); color:var(--mp-white);
    border:none;
  }
  body.state-occupied .btn-primary{ background:var(--mp-orange); }
  body.state-occupied .btn-ghost{ background:rgba(255,255,255,0.14); color:var(--mp-white); }

  .footer-note{
    position:absolute; bottom:8px; left:0; right:0; text-align:center;
    font-size:11px; color:rgba(27,30,61,0.3); font-family:'Inter';
  }
  body.state-occupied .footer-note{ color:rgba(255,255,255,0.25); }

  @media (max-width:640px){
    .meeting-panels{ grid-template-columns:1fr; margin:0 16px; }
    .topbar{ padding:16px 18px; }
    .footer{ padding:16px 18px 22px 18px; flex-direction:column; }
  }
</style>
</head>

      <div class="room-info">
        <span class="room-name" id="roomName">Toplantı Odası</span>
        <span class="room-meta" id="roomMeta"></span>
      </div>
    </div>
    <div class="clock-tab">
      <div class="clock-wrap">
        <div id="clock">--:--</div>
        <span class="date" id="dateLabel">—</span>
      </div>
    </div>
  </div>

  <div class="hero">
    <div class="status-word">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusWord">Yükleniyor…</span>
    </div>
    <div class="status-sub" id="statusSub">Oda bilgisi alınıyor</div>
  </div>

  <div class="day-timeline" id="dayTimeline">
    <div class="timeline-track" id="timelineTrack">
      <div class="timeline-now" id="timelineNow"></div>
    </div>
    <div class="timeline-labels">
      <span id="timelineStartLabel">08:00</span>
      <span id="timelineEndLabel">19:00</span>
    </div>
  </div>

  <div class="meeting-panels">
    <div class="panel">
      <div class="panel-label">Şimdi</div>
      <div id="currentMeeting"><div class="panel-empty">Rezervasyon yok</div></div>
    </div>
    <div class="panel">
      <div class="panel-label">Sıradaki</div>
      <div id="nextMeeting"><div class="panel-empty">Bugün için başka toplantı yok</div></div>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-primary" id="reserveBtn">15 dk için Rezerve Et</button>
    <button class="btn btn-ghost" id="endBtn" style="display:none;">Toplantıyı Sonlandır</button>
  </div>
  <div class="footer-note">MoneyPay · Oda Ekranı</div>

  <!-- Meeting Room 365 SDK -->
  <script src="https://cdn.jsdelivr.net/npm/meetingroom365@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@latest"></script>

  <script>
    // ---------------------------------------------------------------
    // MoneyPay Custom Room Display — powered by Meeting Room 365 SDK
    // ---------------------------------------------------------------
    // NOT: displayConfig'in tam alan adları resmi SDK dokümantasyonunda
    // detaylandırılmamış. Bu yüzden aşağıdaki parseDisplayConfig() fonksiyonu
    // olası birkaç alan adını sırayla deniyor ve konsola tam objeyi basıyor.
    // Gerçek tabletten ilk açılışta tarayıcı konsolunu (veya Fully Kiosk'un
    // "Remote Admin > Console" özelliğini) kontrol edip, gerçek alan adlarını
    // görüp gerekirse bana bildir; eşlemeyi birlikte kesinleştiririz.

    const els = {
      roomName: document.getElementById('roomName'),
      roomMeta: document.getElementById('roomMeta'),
      statusWord: document.getElementById('statusWord'),
      statusSub: document.getElementById('statusSub'),
      statusDot: document.getElementById('statusDot'),
      currentMeeting: document.getElementById('currentMeeting'),
      nextMeeting: document.getElementById('nextMeeting'),
      clock: document.getElementById('clock'),
      dateLabel: document.getElementById('dateLabel'),
      reserveBtn: document.getElementById('reserveBtn'),
      endBtn: document.getElementById('endBtn'),
      timelineTrack: document.getElementById('timelineTrack'),
      timelineNow: document.getElementById('timelineNow'),
      timelineStartLabel: document.getElementById('timelineStartLabel'),
      timelineEndLabel: document.getElementById('timelineEndLabel'),
    };

    // Zaman çizelgesi çalışma saatleri (gerekirse değiştir)
    const TIMELINE_START_HOUR = 8;
    const TIMELINE_END_HOUR = 19;

    function tick() {
      const now = new Date();
      els.clock.textContent = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
      els.dateLabel.textContent = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' });
      positionTimelineNow(now);
    }
    tick();
    setInterval(tick, 15000);

    els.timelineStartLabel.textContent = String(TIMELINE_START_HOUR).padStart(2, '0') + ':00';
    els.timelineEndLabel.textContent = String(TIMELINE_END_HOUR).padStart(2, '0') + ':00';

    function timelinePercent(date) {
      const d = (date instanceof Date) ? date : new Date(date);
      const minutesFromStart = (d.getHours() + d.getMinutes() / 60) - TIMELINE_START_HOUR;
      const totalMinutes = TIMELINE_END_HOUR - TIMELINE_START_HOUR;
      return Math.min(100, Math.max(0, (minutesFromStart / totalMinutes) * 100));
    }

    function positionTimelineNow(now) {
      const pct = timelinePercent(now);
      const inRange = now.getHours() >= TIMELINE_START_HOUR && now.getHours() < TIMELINE_END_HOUR;
      els.timelineNow.style.display = inRange ? '' : 'none';
      els.timelineNow.style.left = pct + '%';
    }

    // Günün toplantılarını ince şerit üzerinde bloklar halinde çiz.
    function renderTimelineBlocks(meetings) {
      els.timelineTrack.querySelectorAll('.timeline-block').forEach(function (b) { b.remove(); });
      if (!Array.isArray(meetings)) return;
      const now = Date.now();
      meetings.forEach(function (m) {
        const start = m.start || m.startTime;
        const end = m.end || m.endTime;
        if (!start || !end) return;
        const startPct = timelinePercent(start);
        const endPct = timelinePercent(end);
        const isCurrent = new Date(start).getTime() <= now && now <= new Date(end).getTime();
        const block = document.createElement('div');
        block.className = 'timeline-block' + (isCurrent ? ' is-current' : '');
        block.style.left = startPct + '%';
        block.style.width = Math.max(0.8, endPct - startPct) + '%';
        els.timelineTrack.appendChild(block);
      });
    }

    function renderRoomMeta(text) {
      els.roomMeta.textContent = text || '';
    }

    function fmtTime(d) {
      if (!d) return '';
      const dt = (d instanceof Date) ? d : new Date(d);
      if (isNaN(dt.getTime())) return '';
      return dt.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    }

    function renderMeetingBlock(el, meeting) {
      if (!meeting) {
        el.innerHTML = '<div class="panel-empty">Rezervasyon yok</div>';
        return;
      }
      const title = meeting.title || meeting.subject || meeting.organizer || 'Rezerve Edildi';
      const start = fmtTime(meeting.start || meeting.startTime);
      const end = fmtTime(meeting.end || meeting.endTime);
      const timeStr = (start && end) ? `${start} – ${end}` : '';
      el.innerHTML = `
        <div class="panel-title">${title}</div>
        ${timeStr ? `<div class="panel-time">${timeStr}</div>` : ''}
      `;
    }

    function setState(occupied) {
      document.body.classList.toggle('state-occupied', !!occupied);
      document.body.classList.toggle('state-available', !occupied);
      els.statusWord.textContent = occupied ? 'DOLU' : 'UYGUN';
      els.reserveBtn.style.display = occupied ? 'none' : '';
      els.endBtn.style.display = occupied ? '' : 'none';
    }

    // Try several likely shapes for the display configuration object.
    function parseDisplayConfig(cfg) {
      if (!cfg) return null;
      const roomName = cfg.name || cfg.roomName || cfg.title || cfg.room?.name || null;
      const occupied = !!(cfg.occupied || cfg.busy || cfg.status === 'occupied' || cfg.currentMeeting || cfg.currentEvent);
      const current = cfg.currentMeeting || cfg.currentEvent || cfg.current || null;
      const allMeetings = Array.isArray(cfg.meetings) ? cfg.meetings : (Array.isArray(cfg.events) ? cfg.events : []);
      const next = cfg.nextMeeting || cfg.nextEvent || cfg.next || allMeetings[0] || null;
      const capacity = cfg.capacity || cfg.seats || cfg.room?.capacity || null;
      const equipment = Array.isArray(cfg.equipment) ? cfg.equipment.join(' · ') : (cfg.equipment || null);
      const meta = [capacity ? `${capacity} kişi` : null, equipment].filter(Boolean).join(' · ');
      return { roomName, occupied, current, next, allMeetings, meta, raw: cfg };
    }

    function applyConfig(cfg) {
      const parsed = parseDisplayConfig(cfg);
      if (!parsed) return;
      if (parsed.roomName) els.roomName.textContent = parsed.roomName;
      renderRoomMeta(parsed.meta);
      setState(parsed.occupied);
      renderMeetingBlock(els.currentMeeting, parsed.current);
      renderMeetingBlock(els.nextMeeting, parsed.next);
      renderTimelineBlocks(parsed.allMeetings);
      els.statusSub.textContent = parsed.occupied
        ? 'Oda şu anda kullanımda'
        : 'Şimdi rezervasyon yapılabilir';
    }

    // ---- Demo mode (no live key / preview mode) ----
    function runDemo() {
      console.log('[MoneyPay Display] Demo modunda çalışıyor — gerçek display key bulunamadı.');
      els.roomName.textContent = 'Business Room';
      renderRoomMeta('8 kişi · TV · Beyaz Tahta');
      let occupied = false;
      setState(occupied);
      els.statusSub.textContent = 'Şimdi rezervasyon yapılabilir';
      renderMeetingBlock(els.currentMeeting, null);
      renderMeetingBlock(els.nextMeeting, {
        title: 'Haftalık Ekip Toplantısı',
        start: new Date(Date.now() + 40 * 60000),
        end: new Date(Date.now() + 100 * 60000),
      });
      const demoDay = new Date();
      function atHour(h, m) { const d = new Date(demoDay); d.setHours(h, m, 0, 0); return d; }
      renderTimelineBlocks([
        { start: atHour(9, 0), end: atHour(9, 45) },
        { start: atHour(10, 30), end: atHour(11, 30) },
        { start: new Date(Date.now() + 40 * 60000), end: new Date(Date.now() + 100 * 60000) },
        { start: atHour(15, 0), end: atHour(16, 0) },
      ]);
      els.reserveBtn.addEventListener('click', () => {
        setState(true);
        els.statusSub.textContent = 'Oda şu anda kullanımda (demo)';
        renderMeetingBlock(els.currentMeeting, {
          title: 'Hızlı Rezervasyon',
          start: new Date(),
          end: new Date(Date.now() + 15 * 60000),
        });
      });
      els.endBtn.addEventListener('click', () => {
        setState(false);
        els.statusSub.textContent = 'Şimdi rezervasyon yapılabilir';
        renderMeetingBlock(els.currentMeeting, null);
      });
    }

    async function boot() {
      const hasKey = location.search.indexOf('key=') !== -1;
      if (typeof Meetingroom365 === 'undefined') {
        console.warn('[MoneyPay Display] Meetingroom365 SDK yüklenemedi (CDN engellenmiş olabilir). Demo moduna geçiliyor.');
        runDemo();
        return;
      }
      try {
        window._debug = true;
        const displayConfig = await Meetingroom365.init({
          STATUS_UPDATE_INTERVAL: 5 * 60 * 1000,
          LOCATION: false,
          onUpdate: function (cfg) {
            console.log('[MoneyPay Display] Configuration güncellendi:', cfg);
            applyConfig(cfg);
          },
        });
        console.log('[MoneyPay Display] İlk displayConfig:', displayConfig);
        if (!displayConfig && !hasKey) {
          runDemo();
          return;
        }
        applyConfig(displayConfig);

        els.reserveBtn.addEventListener('click', () => {
          Meetingroom365.updateStatus({ occupied: true });
          setState(true);
        });
        els.endBtn.addEventListener('click', () => {
          Meetingroom365.updateStatus({ occupied: false });
          setState(false);
        });
      } catch (err) {
        console.error('[MoneyPay Display] SDK init hatası, demo moduna geçiliyor:', err);
        runDemo();
      }
    }

    boot();
  </script>
