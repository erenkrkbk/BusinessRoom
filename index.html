<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MoneyPay — Oda Ekranı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.meetingroom365.com/sdk/v1/sdk.js"></script>

  <style>
    :root {
      --mp-purple: #4A50A2;
      --mp-purple-dark: #20234E;
      --mp-purple-deeper: #171A3D;
      --mp-orange: #FF5F00;
      --mp-white: #FFFFFF;
      --mp-ink: #1B1E3D;
      --mp-paper: #F5F4FA;
      --mp-line: rgba(27,30,61,0.10);
      --cut: 28px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif; background-color: var(--mp-paper); color: var(--mp-ink);
    }
    .display-container {
      display: grid; grid-template-columns: 380px 1fr; width: 100%; height: 100%;
    }
    .sidebar {
      background-color: var(--mp-purple-dark); color: var(--mp-white);
      padding: 40px; display: flex; flex-direction: column; justify-content: space-between;
      position: relative;
    }
    .sidebar::after {
      content: ''; position: absolute; bottom: 0; right: 0;
      width: var(--cut); height: var(--cut);
      background: linear-gradient(135deg, transparent 50%, var(--mp-paper) 50%);
    }
    .brand-area { display: flex; align-items: center; gap: 12px; }
    .logo-placeholder {
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: -0.5px;
    }
    .pay-badge {
      background-color: var(--mp-orange); color: var(--mp-white);
      font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .room-info { margin-top: -60px; }
    .room-label {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 8px;
    }
    .room-name { font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 700; line-height: 1.2; }
    .room-email { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 6px; word-break: break-all; }
    .clock-area { font-family: 'Sora', sans-serif; }
    .time-display { font-size: 64px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .date-display { font-size: 16px; color: rgba(255,255,255,0.5); font-weight: 500; }
    .main-content { padding: 50px 60px; display: flex; flex-direction: column; justify-content: space-between; }
    .status-card { display: flex; align-items: flex-start; gap: 24px; }
    .status-indicator { width: 16px; height: 16px; border-radius: 50%; margin-top: 14px; position: relative; }
    .status-indicator::after {
      content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
      border-radius: 50%; opacity: 0.2;
    }
    .state-available .status-indicator { background-color: #00CC66; }
    .state-available .status-indicator::after { background-color: #00CC66; animation: pulse 2s infinite; }
    .state-occupied .status-indicator { background-color: #FF3B30; }
    .state-occupied .status-indicator::after { background-color: #FF3B30; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.4; } 50% { transform: scale(1.4); opacity: 0; } 100% { transform: scale(0.9); opacity: 0; } }
    .status-text h2 { font-family: 'Sora', sans-serif; font-size: 44px; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
    .status-sub { font-size: 18px; color: #666C85; font-weight: 500; }
    .state-occupied .status-sub { color: var(--mp-ink); font-weight: 600; }
    .meeting-block { margin-top: 24px; background: #20234E; padding: 20px; border-radius: 12px; color: white; display: none; }
    .meeting-block .m-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .meeting-block .m-time { font-size: 14px; opacity: 0.8; }
    .action-zone { display: flex; gap: 16px; }
    .btn {
      font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
      padding: 18px 36px; border: none; border-radius: 12px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s ease;
    }
    .btn-primary { background-color: var(--mp-purple); color: var(--mp-white); }
    .btn-primary:hover { background-color: #3b4085; }
    .btn-outline { background-color: transparent; border: 2px solid var(--mp-line); color: var(--mp-ink); }
    .btn-outline:hover { background-color: rgba(0,0,0,0.02); border-color: var(--mp-ink); }
    .timeline-container { margin-top: 40px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; max-width: 800px; }
    .timeline-header { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #8A91A5; margin-bottom: 20px; }
    .timeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .timeline-slot {
      background: var(--mp-white); border: 1px solid var(--mp-line);
      padding: 20px; border-radius: 14px; display: flex; flex-direction: column; justify-content: space-between; height: 110px;
    }
    .slot-time { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; color: var(--mp-ink); }
    .slot-status { font-size: 13px; font-weight: 600; color: #00CC66; display: flex; align-items: center; gap: 6px; }
    .slot-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background-color: currentColor; }
    .slot-status.busy { color: #FF3B30; }
  </style>
</head>
<body>

  <div class="display-container state-available" id="displayMode">
    
    <aside class="sidebar">
      <div class="brand-area">
        <span class="logo-placeholder">money</span>
        <span class="pay-badge">pay</span>
      </div>
      
      <div class="room-info">
        <p class="room-label">Toplantı Odası</p>
        <h1 class="room-name" id="roomName">Business Room</h1>
        <p class="room-email" id="roomEmail">businessroom@moneypay.com.tr</p>
      </div>
      
      <div class="clock-area">
        <div class="time-display" id="clockTime">00:00</div>
        <div class="date-display" id="clockDate">1 Temmuz Çarşamba</div>
      </div>
    </aside>

    <main class="main-content">
      
      <div class="status-zone">
        <div class="status-card">
          <div class="status-indicator"></div>
          <div class="status-text">
            <h2 id="statusTitle">Uygun</h2>
            <div class="status-sub" id="statusSub">Şimdi rezervasyon yapılabilir</div>
            
            <div class="meeting-block" id="currentMeetingBlock">
              <div class="m-title" id="meetingTitle">Mevcut Toplantı</div>
              <div class="m-time" id="meetingTimeRange">14:00 - 15:00</div>
            </div>
          </div>
        </div>
      </div>

      <div class="timeline-container">
        <p class="timeline-header">Bugün Sıradaki Toplantılar</p>
        <div class="timeline" id="timelineSlots">
          </div>
      </div>

      <div class="action-zone">
        <button class="btn btn-primary" id="reserveBtn">Hızlı Rezervasyon (15 Dk)</button>
        <button class="btn btn-outline" id="endBtn" style="display:none;">Toplantıyı Bitir</button>
      </div>

    </main>
  </div>

  <script>
    // DOM Elementleri
    const els = {
      displayMode: document.getElementById('displayMode'),
      roomName: document.getElementById('roomName'),
      roomEmail: document.getElementById('roomEmail'),
      clockTime: document.getElementById('clockTime'),
      clockDate: document.getElementById('clockDate'),
      statusTitle: document.getElementById('statusTitle'),
      statusSub: document.getElementById('statusSub'),
      reserveBtn: document.getElementById('reserveBtn'),
      endBtn: document.getElementById('endBtn'),
      currentMeetingBlock: document.getElementById('currentMeetingBlock'),
      meetingTitle: document.getElementById('meetingTitle'),
      meetingTimeRange: document.getElementById('meetingTimeRange'),
      timelineSlots: document.getElementById('timelineSlots')
    };

    // Saat ve Tarih Güncelleme
    function updateClock() {
      const now = new Date();
      els.clockTime.textContent = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
      els.clockDate.textContent = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', weekday: 'long' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Ekran Durum Yönetimi (Uygun / Meşgul)
    function setState(isOccupied) {
      if (isOccupied) {
        els.displayMode.className = 'display-container state-occupied';
        els.statusTitle.textContent = 'Meşgul';
        els.reserveBtn.style.display = 'none';
        els.endBtn.style.display = 'inline-flex';
        els.currentMeetingBlock.style.display = 'block';
      } else {
        els.displayMode.className = 'display-container state-available';
        els.statusTitle.textContent = 'Uygun';
        els.statusSub.textContent = 'Şimdi rezervasyon yapılabilir';
        els.reserveBtn.style.display = 'inline-flex';
        els.endBtn.style.display = 'none';
        els.currentMeetingBlock.style.display = 'none';
      }
    }

    // Gelen Canlı Veriyi Arayüze Basma Fonksiyonu
    function applyConfig(cfg) {
      if (!cfg) return;
      console.log('[MoneyPay Display] Veri uygulandı:', cfg);

      // 1. Oda Kimlik Bilgilerini Güncelle
      if (cfg.name) els.roomName.textContent = cfg.name;
      if (cfg.email) els.roomEmail.textContent = cfg.email;

      // 2. Mevcut Toplantı Durum Kontrolü (Occupied)
      // SDK'dan occupied true gelebilir veya aktif bir event (currentMeeting) olabilir
      const hasCurrentMeeting = cfg.currentMeeting || (cfg.events && cfg.events.some(e => e.current));
      
      if (cfg.occupied || hasCurrentMeeting) {
        setState(true);
        const meeting = cfg.currentMeeting || (cfg.events && cfg.events.find(e => e.current));
        if (meeting) {
          els.meetingTitle.textContent = meeting.summary || meeting.title || 'Gizli Toplantı';
          els.statusSub.textContent = meeting.organizer || '';
          if (meeting.start && meeting.end) {
            const sTime = new Date(meeting.start).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            const eTime = new Date(meeting.end).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            els.meetingTimeRange.textContent = `${sTime} - ${eTime}`;
          }
        } else {
          els.meetingTitle.textContent = 'Anlık Rezervasyon';
          els.meetingTimeRange.textContent = 'Devam ediyor...';
        }
      } else {
        setState(false);
      }

      // 3. Gelecek Toplantıları Listeleme (Timeline)
      els.timelineSlots.innerHTML = '';
      const upcomingEvents = cfg.events ? cfg.events.filter(e => !e.current).slice(0, 4) : [];

      if (upcomingEvents.length > 0) {
        upcomingEvents.forEach(event => {
          const startTime = new Date(event.start).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
          const slot = document.createElement('div');
          slot.className = 'timeline-slot';
          slot.innerHTML = `
            <div class="slot-time">${startTime}</div>
            <div class="slot-status busy">${event.summary || 'Dolu'}</div>
          `;
          els.timelineSlots.appendChild(slot);
        });
      } else {
        // Eğer gelecek toplantı yoksa boş slot gösterelim
        els.timelineSlots.innerHTML = `
          <div class="timeline-slot">
            <div class="slot-time">Müsait</div>
            <div class="slot-status">Tüm Gün Uygun</div>
          </div>
        `;
      }
    }

    // Demo Modu (Yedek Plan)
    function runDemo() {
      console.log('[MoneyPay Display] Yedek demo modu başlatıldı.');
      // Demo durumunda bile sağladığınız default bilgileri basalım
      els.roomName.textContent = "Business Room";
      els.roomEmail.textContent = "businessroom@moneypay.com.tr";
      
      // Demo tıklama simülasyonları
      els.reserveBtn.onclick = () => { setState(true); els.meetingTitle.textContent = "Hızlı Toplantı"; els.meetingTimeRange.textContent = "Şimdi - 15 Dk"; };
      els.endBtn.onclick = () => setState(false);
    }

    // Ana Başlatıcı (Boot)
    async function boot() {
      // URL'de 'key=' parametresi var mı kontrolü
      const hasKey = location.search.indexOf('key=') !== -1;

      if (typeof Meetingroom365 === 'undefined') {
        console.warn('[MoneyPay Display] Meetingroom365 SDK bulunamadı, demo moduna geçiliyor.');
        runDemo();
        return;
      }

      try {
        window._debug = true;
        // SDK'yı initialize ediyoruz
        const displayConfig = await Meetingroom365.init({
          STATUS_UPDATE_INTERVAL: 2 * 60 * 1000, // 2 dakikada bir veri tazele
          LOCATION: false,
          onUpdate: function (cfg) {
            applyConfig(cfg);
          },
        });

        // Eğer SDK'dan veri dönmediyse ve URL'de key yoksa Demoya düşür
        if (!displayConfig && !hasKey) {
          runDemo();
          return;
        }

        // İlk gelen veriyi uygula
        applyConfig(displayConfig);

        // Canlı Buton Aksiyonları
        els.reserveBtn.addEventListener('click', () => {
          // Meetingroom365 SDK üzerinden anlık 15dk rezerve etme tetiği
          if (typeof Meetingroom365.reserveInstant === 'function') {
            Meetingroom365.reserveInstant(15);
          } else {
            Meetingroom365.updateStatus({ occupied: true });
          }
          setState(true);
        });

        els.endBtn.addEventListener('click', () => {
          if (typeof Meetingroom365.endMeeting === 'function') {
            Meetingroom365.endMeeting();
          } else {
            Meetingroom365.updateStatus({ occupied: false });
          }
          setState(false);
        });

      } catch (err) {
        console.error('[MoneyPay Display] SDK Init Hatası:', err);
        runDemo();
      }
    }

    // Uygulamayı başlat
    document.addEventListener('DOMContentLoaded', boot);
  </script>
</body>
</html>
